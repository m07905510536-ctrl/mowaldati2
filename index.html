<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>مولدتي</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: { extend: {} }
}
</script>
<style>
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Cairo', sans-serif; direction: rtl; background: #f9fafb; margin: 0; padding: 0; }
input[type="number"]::-webkit-inner-spin-button,
input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

// ── Supabase ──────────────────────────────────────────────────
const SUPA_URL = "https://pnifkbnhvmhwysyqhkwd.supabase.co";
const SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBuaWZrYm5odm1od3lzeXFoa3dkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczNjkxMDEsImV4cCI6MjA5Mjk0NTEwMX0.6R3-arOCvnj6RLCrx9_fj0NX-j9su1bEPZRVlnRpTsc";
const H = { "Content-Type":"application/json","apikey":SUPA_KEY,"Authorization":`Bearer ${SUPA_KEY}`,"Prefer":"return=representation" };
const base = t => `${SUPA_URL}/rest/v1/${t}`;
const sbSelect = async (t,q="") => { const r=await fetch(`${base(t)}?${q}`,{headers:H}); if(!r.ok) throw new Error(await r.text()); return r.json(); };
const sbInsert = async (t,b) => { const r=await fetch(base(t),{method:"POST",headers:H,body:JSON.stringify(b)}); if(!r.ok) throw new Error(await r.text()); return r.json(); };
const sbUpdate = async (t,id,b) => { const r=await fetch(`${base(t)}?id=eq.${id}`,{method:"PATCH",headers:H,body:JSON.stringify(b)}); if(!r.ok) throw new Error(await r.text()); return r.json(); };
const sbDelete = async (t,id) => { const r=await fetch(`${base(t)}?id=eq.${id}`,{method:"DELETE",headers:H}); if(!r.ok) throw new Error(await r.text()); };

// ── Helpers ───────────────────────────────────────────────────
const fmtIQD = n => new Intl.NumberFormat("ar-IQ").format(n||0)+" د.ع";
const MO = ["يناير","فبراير","مارس","أبريل","مايو","يونيو","يوليو","أغسطس","سبتمبر","أكتوبر","نوفمبر","ديسمبر"];
const fmtMY = my => { if(!my) return ""; const [y,m]=my.split("-"); return `${MO[parseInt(m)-1]} ${y}`; };
const nowM = () => new Date().toISOString().slice(0,7);
const iCls = "w-full border border-gray-200 rounded-xl px-4 py-3 text-gray-800 focus:outline-none focus:border-blue-400 focus:ring-2 focus:ring-blue-100 text-sm transition-all";
const sCls = "w-full border border-gray-200 rounded-xl px-4 py-3 text-gray-700 focus:outline-none focus:border-blue-400 text-sm bg-white";

// ── Shared UI ─────────────────────────────────────────────────
const Lbl = ({children,hint}) => <label className="block text-gray-600 text-xs font-semibold mb-1.5">{children}{hint&&<span className="text-blue-500 font-normal mr-1">{hint}</span>}</label>;

function Modal({title,onClose,children}) {
  return (
    <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center">
      <div className="absolute inset-0 bg-black/60 backdrop-blur-sm" onClick={onClose}/>
      <div className="relative bg-white w-full sm:max-w-md rounded-t-3xl sm:rounded-3xl shadow-2xl max-h-[90vh] flex flex-col">
        <div className="flex items-center justify-between p-5 border-b border-gray-100 shrink-0">
          <h3 className="font-black text-gray-900 text-lg">{title}</h3>
          <button onClick={onClose} className="w-9 h-9 bg-gray-100 rounded-xl flex items-center justify-center">✕</button>
        </div>
        <div className="p-5 overflow-y-auto">{children}</div>
      </div>
    </div>
  );
}

function ConfirmDel({msg,onConfirm,onCancel,loading}) {
  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
      <div className="absolute inset-0 bg-black/60 backdrop-blur-sm" onClick={onCancel}/>
      <div className="relative bg-white rounded-2xl shadow-2xl p-6 w-full max-w-sm">
        <div className="flex items-start gap-3 mb-5">
          <div className="w-12 h-12 bg-red-100 rounded-2xl flex items-center justify-center shrink-0">⚠️</div>
          <p className="font-bold text-gray-800 mt-2">{msg}</p>
        </div>
        <div className="flex gap-3">
          <button onClick={onCancel} disabled={loading} className="flex-1 bg-gray-100 text-gray-700 font-bold py-3 rounded-xl">إلغاء</button>
          <button onClick={onConfirm} disabled={loading} className="flex-1 bg-red-600 text-white font-bold py-3 rounded-xl flex items-center justify-center gap-2">
            {loading?"جاري...":"حذف"}
          </button>
        </div>
      </div>
    </div>
  );
}

function StatCard({icon,label,value,color="blue"}) {
  const cols={blue:"from-blue-600 to-blue-700",green:"from-emerald-500 to-emerald-600",amber:"from-amber-500 to-amber-600",purple:"from-purple-600 to-purple-700"};
  return (
    <div className="bg-white rounded-2xl p-4 shadow-sm border border-gray-100 flex items-center gap-3">
      <div className={`bg-gradient-to-br ${cols[color]} p-3 rounded-xl shadow-md shrink-0 text-white text-xl`}>{icon}</div>
      <div className="flex-1 min-w-0">
        <p className="text-gray-400 text-xs font-medium">{label}</p>
        <p className="text-gray-900 font-black text-lg truncate">{value}</p>
      </div>
    </div>
  );
}

const Loading = ({msg="جاري التحميل..."}) => (
  <div className="flex flex-col items-center justify-center py-20 gap-3">
    <div className="w-8 h-8 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
    <p className="text-gray-400 text-sm">{msg}</p>
  </div>
);

const ErrBanner = ({msg,onRetry}) => (
  <div className="flex items-center gap-3 bg-red-50 border border-red-200 rounded-2xl p-4">
    <span className="text-red-500 shrink-0">⚠️</span>
    <p className="text-red-700 font-bold text-sm flex-1">{msg}</p>
    {onRetry&&<button onClick={onRetry} className="bg-red-100 text-red-600 rounded-xl p-2">↺</button>}
  </div>
);

// ── LOGIN ─────────────────────────────────────────────────────
function LoginScreen({onLogin,loading,error}) {
  const [u,setU]=useState(""); const [p,setP]=useState(""); const [show,setShow]=useState(false);
  return (
    <div className="min-h-screen bg-gradient-to-br from-slate-900 via-blue-950 to-slate-900 flex items-center justify-center p-4">
      <div className="absolute inset-0 opacity-10" style={{backgroundImage:"linear-gradient(rgba(59,130,246,.3) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,.3) 1px,transparent 1px)",backgroundSize:"40px 40px"}}/>
      <div className="relative w-full max-w-sm">
        <div className="bg-white/5 backdrop-blur-xl border border-white/10 rounded-3xl p-8 shadow-2xl">
          <div className="text-center mb-8">
            <div className="inline-flex items-center justify-center w-20 h-20 bg-blue-600 rounded-2xl mb-4 shadow-lg shadow-blue-600/30 text-4xl">⚡</div>
            <h1 className="text-4xl font-black text-white mb-1">مولدتي</h1>
            <p className="text-blue-300 text-sm">نظام إدارة المولدات الأهلية</p>
          </div>
          <div className="space-y-4">
            <div>
              <label className="block text-blue-200 text-sm font-semibold mb-2">اسم المستخدم</label>
              <input value={u} onChange={e=>setU(e.target.value)} placeholder="اسم المستخدم"
                className="w-full bg-white/10 border border-white/20 text-white placeholder-white/30 rounded-xl px-4 py-3 focus:outline-none focus:border-blue-400 transition-all"/>
            </div>
            <div>
              <label className="block text-blue-200 text-sm font-semibold mb-2">كلمة المرور</label>
              <div className="relative">
                <input type={show?"text":"password"} value={p} onChange={e=>setP(e.target.value)}
                  onKeyDown={e=>e.key==="Enter"&&onLogin(u,p)} placeholder="كلمة المرور"
                  className="w-full bg-white/10 border border-white/20 text-white placeholder-white/30 rounded-xl px-4 py-3 pl-11 focus:outline-none focus:border-blue-400 transition-all"/>
                <button onClick={()=>setShow(s=>!s)} className="absolute left-3 top-1/2 -translate-y-1/2 text-blue-400">{show?"🙈":"👁"}</button>
              </div>
            </div>
            {error&&<div className="bg-red-500/20 border border-red-500/40 rounded-xl p-3 text-red-300 text-sm">{error}</div>}
            <button onClick={()=>onLogin(u,p)} disabled={loading}
              className="w-full bg-blue-600 hover:bg-blue-500 disabled:opacity-60 text-white font-bold py-3.5 rounded-xl transition-all shadow-lg flex items-center justify-center gap-2">
              {loading?"جاري التحقق...":"تسجيل الدخول"}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── GENERATORS ────────────────────────────────────────────────
function GeneratorsScreen({generators,users,reload,currentUser}) {
  const [modal,setModal]=useState(false); const [editing,setEditing]=useState(null);
  const [delId,setDelId]=useState(null); const [saving,setSaving]=useState(false);
  const [delLoad,setDelLoad]=useState(false); const [err,setErr]=useState("");
  const [form,setForm]=useState({name:"",location:"",price_per_ampere_iqd:""});

  const openAdd=()=>{setForm({name:"",location:"",price_per_ampere_iqd:""});setEditing(null);setErr("");setModal(true);};
  const openEdit=g=>{setForm({name:g.name,location:g.location||"",price_per_ampere_iqd:String(g.price_per_ampere_iqd)});setEditing(g);setErr("");setModal(true);};
  const save=async()=>{
    if(!form.name.trim()||!form.price_per_ampere_iqd){setErr("اسم المولدة والسعر مطلوبان");return;}
    const price=Number(form.price_per_ampere_iqd);
    if(!price||price<=0){setErr("السعر يجب أن يكون أكبر من صفر");return;}
    setSaving(true);setErr("");
    try{
      const payload={name:form.name.trim(),location:form.location.trim(),price_per_ampere_iqd:price,owner_id:currentUser.id};
      if(editing) await sbUpdate("generators",editing.id,payload); else await sbInsert("generators",payload);
      await reload();setModal(false);
    }catch(e){setErr("خطأ: "+e.message);}finally{setSaving(false);}
  };
  const doDelete=async()=>{
    setDelLoad(true);
    try{await sbDelete("generators",delId);await reload();setDelId(null);}
    catch(e){alert("خطأ: "+e.message);}finally{setDelLoad(false);}
  };

  return (
    <div className="space-y-5">
      <div className="flex items-center justify-between">
        <div><h2 className="text-xl font-black text-gray-900">إدارة المولدات</h2><p className="text-gray-500 text-sm">{generators.length} مولدة</p></div>
        <button onClick={openAdd} className="bg-blue-600 hover:bg-blue-500 text-white font-bold px-4 py-2.5 rounded-xl flex items-center gap-2 text-sm shadow-lg transition-colors">+ إضافة مولدة</button>
      </div>
      {generators.length===0&&<div className="bg-white rounded-2xl p-10 border border-dashed border-gray-200 text-center"><p className="text-5xl mb-3">⚡</p><p className="text-gray-500 font-bold">لا توجد مولدات بعد</p></div>}
      <div className="space-y-3">
        {generators.map(g=>{
          const workers=users.filter(u=>u.assigned_generator_id===g.id);
          return (
            <div key={g.id} className="bg-white rounded-2xl p-4 border border-gray-100 shadow-sm">
              <div className="flex items-start gap-3 mb-3">
                <div className="w-11 h-11 bg-blue-100 rounded-xl flex items-center justify-center shrink-0 text-2xl">⚡</div>
                <div className="flex-1 min-w-0">
                  <p className="font-black text-gray-900">{g.name}</p>
                  {g.location&&<p className="text-gray-400 text-xs mt-0.5">📍 {g.location}</p>}
                </div>
                <div className="flex gap-1.5 shrink-0">
                  <button onClick={()=>openEdit(g)} className="w-9 h-9 bg-blue-50 hover:bg-blue-100 text-blue-600 rounded-xl flex items-center justify-center transition-colors">✏️</button>
                  <button onClick={()=>setDelId(g.id)} className="w-9 h-9 bg-red-50 hover:bg-red-100 text-red-500 rounded-xl flex items-center justify-center transition-colors">🗑️</button>
                </div>
              </div>
              <div className="grid grid-cols-2 gap-2 text-xs text-center">
                <div className="bg-blue-50 rounded-xl p-2.5"><p className="text-blue-400 mb-0.5">السعر/أمبير</p><p className="font-black text-blue-700">{fmtIQD(g.price_per_ampere_iqd)}</p></div>
                <div className="bg-gray-50 rounded-xl p-2.5"><p className="text-gray-400 mb-0.5">العمال</p><p className="font-black text-gray-700">{workers.length}</p></div>
              </div>
            </div>
          );
        })}
      </div>
      {modal&&(
        <Modal title={editing?"تعديل المولدة":"مولدة جديدة"} onClose={()=>!saving&&setModal(false)}>
          <div className="space-y-4">
            <div><Lbl>اسم المولدة *</Lbl><input value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} placeholder="مثال: مولدة حي الرشيد" className={iCls}/></div>
            <div><Lbl>الموقع</Lbl><input value={form.location} onChange={e=>setForm(f=>({...f,location:e.target.value}))} placeholder="شارع، حي، مدينة" className={iCls}/></div>
            <div><Lbl>سعر الأمبير (دينار عراقي) *</Lbl><input type="number" value={form.price_per_ampere_iqd} onChange={e=>setForm(f=>({...f,price_per_ampere_iqd:e.target.value}))} placeholder="15000" className={iCls}/></div>
            {err&&<p className="text-red-500 text-sm font-semibold bg-red-50 px-3 py-2 rounded-xl">{err}</p>}
            <div className="flex gap-3 pt-1">
              <button onClick={()=>setModal(false)} disabled={saving} className="flex-1 bg-gray-100 text-gray-700 font-bold py-3 rounded-xl">إلغاء</button>
              <button onClick={save} disabled={saving} className="flex-1 bg-blue-600 hover:bg-blue-500 disabled:opacity-60 text-white font-bold py-3 rounded-xl flex items-center justify-center gap-2">
                {saving?"جاري الحفظ...":(editing?"حفظ التعديل":"إضافة")}
              </button>
            </div>
          </div>
        </Modal>
      )}
      {delId&&<ConfirmDel msg="هل تريد حذف هذه المولدة؟ سيتم حذف سجلاتها أيضاً." onConfirm={doDelete} onCancel={()=>setDelId(null)} loading={delLoad}/>}
    </div>
  );
}

// ── USERS ─────────────────────────────────────────────────────
function UsersScreen({users,generators,reload}) {
  const [modal,setModal]=useState(false); const [editing,setEditing]=useState(null);
  const [delId,setDelId]=useState(null); const [showP,setShowP]=useState(false);
  const [saving,setSaving]=useState(false); const [delLoad,setDelLoad]=useState(false); const [err,setErr]=useState("");
  const [form,setForm]=useState({name:"",username:"",password:"",role:"worker",assigned_generator_id:""});

  const openAdd=()=>{setForm({name:"",username:"",password:"",role:"worker",assigned_generator_id:""});setEditing(null);setErr("");setShowP(false);setModal(true);};
  const openEdit=u=>{setForm({name:u.name,username:u.username,password:"",role:u.role,assigned_generator_id:u.assigned_generator_id||""});setEditing(u);setErr("");setShowP(false);setModal(true);};
  const save=async()=>{
    if(!form.name.trim()||!form.username.trim()){setErr("الاسم واسم المستخدم مطلوبان");return;}
    if(!editing&&!form.password.trim()){setErr("كلمة المرور مطلوبة");return;}
    const dup=users.find(u=>u.username===form.username.trim()&&(!editing||u.id!==editing.id));
    if(dup){setErr("اسم المستخدم موجود مسبقاً");return;}
    setSaving(true);setErr("");
    try{
      const payload={name:form.name.trim(),username:form.username.trim(),role:form.role,assigned_generator_id:form.assigned_generator_id||null,...(form.password.trim()?{password:form.password.trim()}:{})};
      if(editing) await sbUpdate("users",editing.id,payload); else await sbInsert("users",{...payload,password:form.password.trim()});
      await reload();setModal(false);
    }catch(e){setErr("خطأ: "+e.message);}finally{setSaving(false);}
  };
  const doDelete=async()=>{
    setDelLoad(true);
    try{await sbDelete("users",delId);await reload();setDelId(null);}
    catch(e){alert("خطأ: "+e.message);}finally{setDelLoad(false);}
  };

  const RI={owner:{l:"مالك",c:"bg-purple-100 text-purple-700",i:"👑"},admin:{l:"مدير",c:"bg-blue-100 text-blue-700",i:"💼"},worker:{l:"عامل",c:"bg-emerald-100 text-emerald-700",i:"🔧"}};

  return (
    <div className="space-y-5">
      <div className="flex items-center justify-between">
        <div><h2 className="text-xl font-black text-gray-900">إدارة المستخدمين</h2><p className="text-gray-500 text-sm">{users.length} مستخدم</p></div>
        <button onClick={openAdd} className="bg-blue-600 hover:bg-blue-500 text-white font-bold px-4 py-2.5 rounded-xl flex items-center gap-2 text-sm shadow-lg transition-colors">+ إضافة</button>
      </div>
      <div className="space-y-3">
        {users.map(u=>{
          const ri=RI[u.role]||RI.worker;
          const gen=generators.find(g=>g.id===u.assigned_generator_id);
          return (
            <div key={u.id} className="bg-white rounded-2xl p-4 border border-gray-100 shadow-sm flex items-center gap-3">
              <div className="w-11 h-11 bg-gray-100 rounded-xl flex items-center justify-center shrink-0 text-2xl">{ri.i}</div>
              <div className="flex-1 min-w-0">
                <div className="flex items-center gap-2 flex-wrap">
                  <p className="font-black text-gray-900 text-sm">{u.name}</p>
                  <span className={`text-xs font-bold px-2 py-0.5 rounded-lg ${ri.c}`}>{ri.l}</span>
                </div>
                <p className="text-gray-400 text-xs mt-0.5">@{u.username}{gen?` · ${gen.name}`:""}</p>
              </div>
              {u.role!=="owner"&&(
                <div className="flex gap-1.5 shrink-0">
                  <button onClick={()=>openEdit(u)} className="w-9 h-9 bg-blue-50 hover:bg-blue-100 text-blue-600 rounded-xl flex items-center justify-center">✏️</button>
                  <button onClick={()=>setDelId(u.id)} className="w-9 h-9 bg-red-50 hover:bg-red-100 text-red-500 rounded-xl flex items-center justify-center">🗑️</button>
                </div>
              )}
            </div>
          );
        })}
      </div>
      {modal&&(
        <Modal title={editing?"تعديل مستخدم":"مستخدم جديد"} onClose={()=>!saving&&setModal(false)}>
          <div className="space-y-4">
            <div><Lbl>الاسم الكامل *</Lbl><input value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} placeholder="الاسم الكامل" className={iCls}/></div>
            <div><Lbl>اسم الدخول *</Lbl><input value={form.username} onChange={e=>setForm(f=>({...f,username:e.target.value}))} placeholder="username" className={iCls} style={{direction:"ltr",textAlign:"right"}}/></div>
            <div>
              <Lbl hint={editing?"(اتركه فارغاً للإبقاء)":undefined}>كلمة المرور {!editing&&"*"}</Lbl>
              <div className="relative">
                <input type={showP?"text":"password"} value={form.password} onChange={e=>setForm(f=>({...f,password:e.target.value}))} placeholder="كلمة المرور" className={iCls+" pl-11"}/>
                <button onClick={()=>setShowP(s=>!s)} className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">{showP?"🙈":"👁"}</button>
              </div>
            </div>
            <div><Lbl>الصلاحية *</Lbl><select value={form.role} onChange={e=>setForm(f=>({...f,role:e.target.value}))} className={sCls}><option value="admin">مدير</option><option value="worker">عامل</option></select></div>
            <div><Lbl>المولدة المخصصة</Lbl><select value={form.assigned_generator_id} onChange={e=>setForm(f=>({...f,assigned_generator_id:e.target.value}))} className={sCls}><option value="">— بدون مولدة —</option>{generators.map(g=><option key={g.id} value={g.id}>{g.name}</option>)}</select></div>
            {err&&<p className="text-red-500 text-sm font-semibold bg-red-50 px-3 py-2 rounded-xl">{err}</p>}
            <div className="flex gap-3 pt-1">
              <button onClick={()=>setModal(false)} disabled={saving} className="flex-1 bg-gray-100 text-gray-700 font-bold py-3 rounded-xl">إلغاء</button>
              <button onClick={save} disabled={saving} className="flex-1 bg-blue-600 hover:bg-blue-500 disabled:opacity-60 text-white font-bold py-3 rounded-xl">{saving?"جاري...":(editing?"حفظ":"إضافة")}</button>
            </div>
          </div>
        </Modal>
      )}
      {delId&&<ConfirmDel msg="هل تريد حذف هذا المستخدم؟" onConfirm={doDelete} onCancel={()=>setDelId(null)} loading={delLoad}/>}
    </div>
  );
}

// ── DASHBOARD ─────────────────────────────────────────────────
function Dashboard({generators,subscriptions,user}) {
  const totalRev=subscriptions.reduce((a,s)=>a+(s.amount_received||0),0);
  const totalExp=subscriptions.reduce((a,s)=>a+(s.amount_expected||0),0);
  return (
    <div className="space-y-5">
      <div><h2 className="text-xl font-black text-gray-900">لوحة القيادة</h2><p className="text-gray-500 text-sm">أهلاً، {user.name}</p></div>
      <div className="grid grid-cols-2 gap-3">
        <StatCard icon="📈" label="إجمالي الإيرادات" value={fmtIQD(totalRev)} color="blue"/>
        <StatCard icon="⏳" label="المتبقي" value={fmtIQD(totalExp-totalRev)} color="amber"/>
        <StatCard icon="⚡" label="المولدات" value={generators.length} color="purple"/>
        <StatCard icon="📋" label="إجمالي السجلات" value={subscriptions.length} color="green"/>
      </div>
      <div>
        <h3 className="font-black text-gray-800 mb-3">تفصيل المولدات</h3>
        {generators.length===0&&<div className="bg-white rounded-2xl p-6 border border-dashed border-gray-200 text-center"><p className="text-gray-400 text-sm">أضف مولداتك من قسم المولدات</p></div>}
        <div className="space-y-3">
          {generators.map(g=>{
            const subs=subscriptions.filter(s=>s.generator_id===g.id);
            const rev=subs.reduce((a,s)=>a+(s.amount_received||0),0);
            const exp=subs.reduce((a,s)=>a+(s.amount_expected||0),0);
            const pct=exp>0?Math.round((rev/exp)*100):0;
            return (
              <div key={g.id} className="bg-white rounded-2xl p-4 border border-gray-100 shadow-sm">
                <div className="flex justify-between items-start mb-2">
                  <div><p className="font-black text-gray-900">{g.name}</p>{g.location&&<p className="text-gray-400 text-xs mt-0.5">📍 {g.location}</p>}</div>
                  <span className="bg-blue-100 text-blue-700 text-xs font-bold px-2 py-1 rounded-lg">{fmtIQD(g.price_per_ampere_iqd)}/أمبير</span>
                </div>
                <div className="w-full h-1.5 bg-gray-100 rounded-full overflow-hidden mb-3"><div className="h-full bg-blue-500 rounded-full" style={{width:`${pct}%`}}/></div>
                <div className="flex gap-5 text-sm">
                  <div><p className="text-gray-400 text-xs">الإيرادات</p><p className="font-black text-emerald-600">{fmtIQD(rev)}</p></div>
                  <div><p className="text-gray-400 text-xs">السجلات</p><p className="font-black text-gray-800">{subs.length}</p></div>
                  <div><p className="text-gray-400 text-xs">التحصيل</p><p className="font-black text-blue-600">{pct}%</p></div>
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ── REVENUE HISTORY ───────────────────────────────────────────
function RevenueHistory({subscriptions,generators}) {
  const [fGen,setFGen]=useState("all"); const [fYear,setFYear]=useState("all");
  const years=[...new Set(subscriptions.map(s=>s.month_year?.split("-")[0]))].filter(Boolean).sort().reverse();
  const filtered=subscriptions.filter(s=>{
    if(fGen!=="all"&&s.generator_id!==fGen) return false;
    if(fYear!=="all"&&!s.month_year?.startsWith(fYear)) return false;
    return true;
  });
  const byM={};
  filtered.forEach(s=>{if(!byM[s.month_year])byM[s.month_year]={exp:0,rec:0,n:0};byM[s.month_year].exp+=s.amount_expected||0;byM[s.month_year].rec+=s.amount_received||0;byM[s.month_year].n++;});
  const rows=Object.entries(byM).sort((a,b)=>b[0].localeCompare(a[0]));
  const totalRec=filtered.reduce((a,s)=>a+(s.amount_received||0),0);
  return (
    <div className="space-y-5">
      <div><h2 className="text-xl font-black text-gray-900">السجل المالي</h2><p className="text-gray-500 text-sm">الإيرادات الشهرية</p></div>
      <div className="flex gap-2">
        <select value={fGen} onChange={e=>setFGen(e.target.value)} className={sCls+" flex-1"}><option value="all">كل المولدات</option>{generators.map(g=><option key={g.id} value={g.id}>{g.name}</option>)}</select>
        <select value={fYear} onChange={e=>setFYear(e.target.value)} className={sCls+" flex-1"}><option value="all">كل السنوات</option>{years.map(y=><option key={y} value={y}>{y}</option>)}</select>
      </div>
      <div className="bg-gradient-to-br from-blue-600 to-blue-800 rounded-2xl p-5 text-white shadow-lg">
        <p className="text-blue-200 text-sm">إجمالي الإيرادات المصفاة</p>
        <p className="text-3xl font-black mt-1">{fmtIQD(totalRec)}</p>
        <p className="text-blue-200 text-xs mt-1">{filtered.length} سجل تحصيل</p>
      </div>
      {rows.length===0&&<div className="bg-white rounded-2xl p-10 text-center border border-gray-100"><p className="text-gray-400">لا توجد بيانات بعد</p></div>}
      <div className="space-y-3">
        {rows.map(([my,d])=>{
          const pct=d.exp>0?Math.round((d.rec/d.exp)*100):0;
          return (
            <div key={my} className="bg-white rounded-2xl p-4 border border-gray-100 shadow-sm">
              <div className="flex justify-between items-center mb-3">
                <div><p className="font-black text-gray-900">{fmtMY(my)}</p><p className="text-gray-400 text-xs">{d.n} مشترك</p></div>
                <span className={`text-xs font-black px-2 py-1 rounded-lg ${pct>=100?"bg-emerald-100 text-emerald-700":"bg-amber-100 text-amber-700"}`}>{pct}% تحصيل</span>
              </div>
              <div className="w-full h-2 bg-gray-100 rounded-full overflow-hidden mb-3"><div className="h-full bg-blue-500 rounded-full" style={{width:`${pct}%`}}/></div>
              <div className="grid grid-cols-3 gap-2 text-xs text-center">
                <div className="bg-gray-50 rounded-xl p-2"><p className="text-gray-400">المتوقع</p><p className="font-black text-gray-700">{(d.exp/1000).toFixed(0)}K</p></div>
                <div className="bg-emerald-50 rounded-xl p-2"><p className="text-emerald-500">المحصّل</p><p className="font-black text-emerald-700">{(d.rec/1000).toFixed(0)}K</p></div>
                <div className="bg-amber-50 rounded-xl p-2"><p className="text-amber-500">المتبقي</p><p className="font-black text-amber-700">{((d.exp-d.rec)/1000).toFixed(0)}K</p></div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── WORKER ENTRY ──────────────────────────────────────────────
function WorkerEntry({generators,subscriptions,reloadSubs,user}) {
  const gen=generators.find(g=>g.id===user.assigned_generator_id);
  const [search,setSearch]=useState(""); const [ok,setOk]=useState(false);
  const [saving,setSaving]=useState(false); const [err,setErr]=useState("");
  const [suggs,setSuggs]=useState([]); const [showS,setShowS]=useState(false);
  const [form,setForm]=useState({subscriber_info:"",amperes:"",amount_received:"",notes:"",month_year:nowM()});

  const known=[...new Set(subscriptions.filter(s=>s.generator_id===user.assigned_generator_id).map(s=>s.subscriber_info))];
  const handleSearch=v=>{setSearch(v);setForm(f=>({...f,subscriber_info:v}));setSuggs(v.length>=2?known.filter(s=>s.includes(v)):[]);setShowS(v.length>=2);};
  const handleAmp=v=>{const amp=parseFloat(v)||0;setForm(f=>({...f,amperes:v,amount_received:gen&&amp?String(amp*gen.price_per_ampere_iqd):""}));};
  const submit=async()=>{
    if(!form.subscriber_info.trim()||!form.amperes||!form.amount_received||!gen) return;
    setSaving(true);setErr("");
    try{
      const amp=parseFloat(form.amperes);
      await sbInsert("subscriptions",{subscriber_info:form.subscriber_info.trim(),generator_id:user.assigned_generator_id,worker_id:user.id,amperes:amp,amount_expected:amp*gen.price_per_ampere_iqd,amount_received:parseFloat(form.amount_received),month_year:form.month_year,notes:form.notes});
      await reloadSubs();
      setForm({subscriber_info:"",amperes:"",amount_received:"",notes:"",month_year:nowM()});
      setSearch("");setOk(true);setTimeout(()=>setOk(false),3000);
    }catch(e){setErr("خطأ: "+e.message);}finally{setSaving(false);}
  };
  const mine=[...subscriptions].filter(s=>s.worker_id===user.id).slice(0,6);

  return (
    <div className="space-y-5">
      <div><h2 className="text-xl font-black text-gray-900">إدخال بيانات</h2>{gen?<p className="text-blue-600 text-sm font-semibold">{gen.name}</p>:<p className="text-amber-600 text-sm font-semibold">⚠ لم يتم تخصيص مولدة لك</p>}</div>
      {ok&&<div className="flex items-center gap-3 bg-emerald-50 border border-emerald-200 rounded-2xl p-4"><span className="text-2xl">✅</span><div><p className="font-bold text-emerald-800">تم الحفظ بنجاح!</p><p className="text-emerald-600 text-sm">تم التسجيل في Supabase</p></div></div>}
      {err&&<ErrBanner msg={err} onRetry={()=>setErr("")}/>}
      <div className="bg-white rounded-2xl p-4 border border-gray-100 shadow-sm space-y-4">
        <h3 className="font-black text-gray-800 text-sm">+ تسجيل اشتراك جديد</h3>
        <div className="relative">
          <Lbl>اسم المشترك وصاحب الجوزة</Lbl>
          <div className="relative">
            <span className="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400">🔍</span>
            <input value={search} onChange={e=>handleSearch(e.target.value)} onBlur={()=>setTimeout(()=>setShowS(false),150)} onFocus={()=>suggs.length&&setShowS(true)} placeholder="ابحث أو أدخل اسم جديد..." className={iCls+" pr-10"}/>
          </div>
          {showS&&suggs.length>0&&<div className="absolute z-10 w-full mt-1 bg-white border border-gray-200 rounded-xl shadow-lg overflow-hidden">{suggs.map((s,i)=><button key={i} onMouseDown={()=>{setSearch(s);setForm(f=>({...f,subscriber_info:s}));setShowS(false);}} className="w-full text-right px-4 py-2.5 text-sm text-gray-700 hover:bg-blue-50 border-b border-gray-50 last:border-0">{s}</button>)}</div>}
        </div>
        <div><Lbl>الشهر</Lbl><input type="month" value={form.month_year} onChange={e=>setForm(f=>({...f,month_year:e.target.value}))} className={iCls}/></div>
        <div className="grid grid-cols-2 gap-3">
          <div>
            <Lbl>الأمبيرات</Lbl>
            <input type="number" value={form.amperes} onChange={e=>handleAmp(e.target.value)} placeholder="0" className={iCls}/>
            {gen&&<p className="text-gray-400 text-xs mt-1">{fmtIQD(gen.price_per_ampere_iqd)}/أمبير</p>}
          </div>
          <div>
            <Lbl hint="(قابل للتعديل)">المبلغ المحصّل</Lbl>
            <input type="number" value={form.amount_received} onChange={e=>setForm(f=>({...f,amount_received:e.target.value}))} placeholder="0" className="w-full border border-emerald-300 bg-emerald-50 rounded-xl px-4 py-3 text-gray-800 focus:outline-none focus:border-emerald-400 text-sm font-bold"/>
          </div>
        </div>
        <div><Lbl>ملاحظات</Lbl><textarea value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))} placeholder="خصم، دفع جزئي، ..." rows={2} className={iCls+" resize-none"}/></div>
        <button onClick={submit} disabled={!form.subscriber_info.trim()||!form.amperes||!form.amount_received||!gen||saving}
          className="w-full bg-blue-600 hover:bg-blue-500 disabled:opacity-50 text-white font-black py-3.5 rounded-xl flex items-center justify-center gap-2 shadow-lg transition-all">
          {saving?"جاري الحفظ...":"💾 حفظ الاشتراك"}
        </button>
      </div>
      <div>
        <h3 className="text-sm font-black text-gray-800 mb-3">🕐 آخر سجلاتك</h3>
        <div className="space-y-2">
          {mine.length===0&&<p className="text-center text-gray-400 text-sm py-6">لا توجد سجلات بعد</p>}
          {mine.map(s=>(
            <div key={s.id} className="bg-white rounded-xl p-3 border border-gray-100 shadow-sm flex items-center gap-3">
              <div className="w-10 h-10 bg-blue-100 rounded-xl flex items-center justify-center shrink-0 text-xl">⚡</div>
              <div className="flex-1 min-w-0"><p className="font-bold text-gray-800 text-sm truncate">{s.subscriber_info}</p><p className="text-gray-400 text-xs">{fmtMY(s.month_year)} · {s.amperes} أمبير</p></div>
              <div className="text-left shrink-0"><p className="font-black text-emerald-600 text-sm">{fmtIQD(s.amount_received)}</p>{s.notes&&<p className="text-amber-500 text-xs">{s.notes}</p>}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ── TRANSACTIONS ──────────────────────────────────────────────
function Transactions({subscriptions,generators,users,user}) {
  const [q,setQ]=useState("");
  const subs=[...subscriptions].filter(s=>{
    if(user.role==="worker"&&s.worker_id!==user.id) return false;
    if(q&&!s.subscriber_info?.includes(q)) return false;
    return true;
  });
  return (
    <div className="space-y-5">
      <div><h2 className="text-xl font-black text-gray-900">سجل المعاملات</h2><p className="text-gray-500 text-sm">{user.role==="worker"?"سجلاتك فقط":`${subs.length} سجل`}</p></div>
      <div className="relative"><span className="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400">🔍</span><input value={q} onChange={e=>setQ(e.target.value)} placeholder="بحث باسم المشترك..." className={iCls+" pr-10"}/></div>
      <div className="space-y-2">
        {subs.length===0&&<div className="bg-white rounded-2xl p-10 text-center border border-gray-100"><p className="text-gray-400">لا توجد نتائج</p></div>}
        {subs.map(s=>{
          const g=generators.find(x=>x.id===s.generator_id);
          const w=users.find(x=>x.id===s.worker_id);
          const paid=(s.amount_received||0)>=(s.amount_expected||0);
          return (
            <div key={s.id} className="bg-white rounded-2xl p-4 border border-gray-100 shadow-sm">
              <div className="flex items-start justify-between mb-2 gap-2">
                <div className="flex-1 min-w-0"><p className="font-black text-gray-900 text-sm">{s.subscriber_info}</p><p className="text-gray-400 text-xs mt-0.5">{g?.name||"—"} · {fmtMY(s.month_year)}</p></div>
                <span className={`text-xs font-bold px-2 py-0.5 rounded-lg shrink-0 ${paid?"bg-emerald-100 text-emerald-700":"bg-amber-100 text-amber-700"}`}>{paid?"مدفوع":"جزئي"}</span>
              </div>
              <div className="flex items-center justify-between">
                <span className="text-xs text-gray-400">👤 {w?.name||"—"}</span>
                <span className="font-black text-gray-900">{fmtIQD(s.amount_received)}</span>
              </div>
              {s.notes&&<p className="text-amber-600 text-xs mt-2 bg-amber-50 rounded-lg px-2 py-1">{s.notes}</p>}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── NAV ───────────────────────────────────────────────────────
const NAV={
  owner:[{id:"dashboard",icon:"🏠",label:"الرئيسية"},{id:"generators",icon:"⚡",label:"المولدات"},{id:"history",icon:"📊",label:"المالية"},{id:"transactions",icon:"📋",label:"المعاملات"},{id:"users",icon:"👥",label:"المستخدمون"}],
  admin:[{id:"transactions",icon:"📋",label:"المعاملات"},{id:"entry",icon:"➕",label:"إدخال"}],
  worker:[{id:"entry",icon:"➕",label:"إدخال بيانات"},{id:"transactions",icon:"📋",label:"سجلاتي"}],
};

// ── ROOT APP ──────────────────────────────────────────────────
function App() {
  const [user,setUser]=useState(null); const [tab,setTab]=useState(null);
  const [authLoad,setAuthLoad]=useState(false); const [authErr,setAuthErr]=useState("");
  const [users,setUsers]=useState([]); const [generators,setGenerators]=useState([]);
  const [subscriptions,setSubscriptions]=useState([]); const [dataLoading,setDataLoading]=useState(false); const [dataErr,setDataErr]=useState("");

  const loadData=useCallback(async()=>{
    setDataLoading(true);setDataErr("");
    try{
      const [u,g,s]=await Promise.all([sbSelect("users","order=created_at.asc"),sbSelect("generators","order=created_at.asc"),sbSelect("subscriptions","order=created_at.desc")]);
      setUsers(u);setGenerators(g);setSubscriptions(s);
    }catch(e){setDataErr("تعذّر تحميل البيانات: "+e.message);}finally{setDataLoading(false);}
  },[]);

  const reloadAll=useCallback(async()=>{
    try{
      const [u,g,s]=await Promise.all([sbSelect("users","order=created_at.asc"),sbSelect("generators","order=created_at.asc"),sbSelect("subscriptions","order=created_at.desc")]);
      setUsers(u);setGenerators(g);setSubscriptions(s);
      setUser(prev=>prev?(u.find(x=>x.id===prev.id)||null):null);
    }catch(e){console.error(e);}
  },[]);

  const reloadSubs=useCallback(async()=>{
    try{const s=await sbSelect("subscriptions","order=created_at.desc");setSubscriptions(s);}catch(e){console.error(e);}
  },[]);

  useEffect(()=>{if(user) loadData();},[user]);

  const login=async(username,password)=>{
    setAuthLoad(true);setAuthErr("");
    try{
      const rows=await sbSelect("users",`username=eq.${encodeURIComponent(username)}&password=eq.${encodeURIComponent(password)}&limit=1`);
      if(rows.length>0){setUser(rows[0]);setTab(NAV[rows[0].role]?.[0]?.id||"entry");}
      else setAuthErr("اسم المستخدم أو كلمة المرور غير صحيحة");
    }catch(e){setAuthErr("تعذّر الاتصال: "+e.message);}finally{setAuthLoad(false);}
  };

  const logout=()=>{setUser(null);setTab(null);setUsers([]);setGenerators([]);setSubscriptions([]);};

  if(!user) return <LoginScreen onLogin={login} loading={authLoad} error={authErr}/>;

  const navItems=NAV[user.role]||NAV.worker;
  const RLBL={owner:"مالك",admin:"مدير",worker:"عامل"};
  const RCLR={owner:"bg-purple-100 text-purple-700",admin:"bg-blue-100 text-blue-700",worker:"bg-emerald-100 text-emerald-700"};

  const renderScreen=()=>{
    if(dataLoading) return <Loading msg="جاري تحميل البيانات من Supabase..."/>;
    if(dataErr) return <ErrBanner msg={dataErr} onRetry={loadData}/>;
    switch(tab){
      case "dashboard":    return <Dashboard generators={generators} subscriptions={subscriptions} user={user}/>;
      case "generators":   return <GeneratorsScreen generators={generators} users={users} reload={reloadAll} currentUser={user}/>;
      case "history":      return <RevenueHistory subscriptions={subscriptions} generators={generators}/>;
      case "transactions": return <Transactions subscriptions={subscriptions} generators={generators} users={users} user={user}/>;
      case "users":        return <UsersScreen users={users} generators={generators} reload={reloadAll}/>;
      case "entry":        return <WorkerEntry generators={generators} subscriptions={subscriptions} reloadSubs={reloadSubs} user={user}/>;
      default:             return null;
    }
  };

  return (
    <div className="min-h-screen bg-gray-50 flex flex-col max-w-md mx-auto">
      <header className="bg-white border-b border-gray-100 px-4 py-3 flex items-center justify-between sticky top-0 z-20 shadow-sm">
        <div className="flex items-center gap-2">
          <div className="w-8 h-8 bg-blue-600 rounded-xl flex items-center justify-center text-white font-bold shadow shadow-blue-600/30">⚡</div>
          <span className="font-black text-gray-900 text-lg">مولدتي</span>
        </div>
        <div className="flex items-center gap-2">
          <button onClick={reloadAll} className="w-9 h-9 bg-gray-100 hover:bg-blue-50 text-gray-500 hover:text-blue-600 rounded-xl flex items-center justify-center transition-colors">↺</button>
          <div className="text-right">
            <p className="text-gray-800 text-xs font-bold leading-tight">{user.name}</p>
            <span className={`text-xs font-bold px-1.5 py-0.5 rounded-md ${RCLR[user.role]}`}>{RLBL[user.role]}</span>
          </div>
          <button onClick={logout} className="w-9 h-9 bg-gray-100 hover:bg-red-50 text-gray-500 hover:text-red-600 rounded-xl flex items-center justify-center transition-colors">🚪</button>
        </div>
      </header>
      <main className="flex-1 overflow-y-auto px-4 py-5 pb-28">{renderScreen()}</main>
      <nav className="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md bg-white border-t border-gray-100 z-20 shadow-[0_-4px_20px_rgba(0,0,0,0.07)]">
        <div className="flex items-center justify-around px-1 py-1.5">
          {navItems.map(item=>{
            const active=tab===item.id;
            return (
              <button key={item.id} onClick={()=>setTab(item.id)}
                className={`flex flex-col items-center gap-0.5 px-2 py-2 rounded-xl transition-all flex-1 ${active?"bg-blue-50 text-blue-600":"text-gray-400"}`}>
                <span className="text-xl">{item.icon}</span>
                <span className="text-xs font-bold truncate w-full text-center leading-tight">{item.label}</span>
                {active&&<div className="w-1 h-1 bg-blue-600 rounded-full"/>}
              </button>
            );
          })}
        </div>
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
